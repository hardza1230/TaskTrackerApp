<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
        content="script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com https://cdnjs.cloudflare.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner Want to Go Home V.1.12</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Sarabun', 'sans-serif'] },
                    colors: {
                        primary: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        },
                        accent: {
                            50: '#fdf4ff',
                            100: '#fae8ff',
                            200: '#f5d0fe',
                            300: '#f0abfc',
                            400: '#e879f9',
                            500: '#d946ef',
                            600: '#c026d3',
                            700: '#a21caf',
                            800: '#86198f',
                            900: '#701a75',
                        },
                        brand: {
                            start: '#0F766E', // Teal 700
                            end: '#06B6D4',   // Cyan 500
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'water-flow': 'water-flow 3s linear infinite',
                        'slide-up': 'slide-up 0.4s ease-out'
                    },
                    keyframes: {
                        'water-flow': {
                            '0%': { backgroundPosition: '200% 0' },
                            '100%': { backgroundPosition: '-200% 0' }
                        },
                        'slide-up': {
                            '0%': { transform: 'translateY(10px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #F8FAFC;
            font-family: 'Sarabun', sans-serif;
            overflow: hidden;
            color: #1E293B;
        }

        /* Smooth Task Transitions */
        .task-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #E2E8F0;
            break-inside: avoid;
            margin-bottom: 1.5rem;
            overflow: hidden;
            animation: slide-up 0.4s ease-out;
        }

        .task-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .task-item-row {
            transition: all 0.2s ease;
        }

        .task-item-row:active {
            transform: scale(0.98);
        }

        /* Sortable ghost class */
        .sortable-ghost {
            opacity: 0.4;
            background: #F1F5F9 !important;
            border: 2px dashed #CBD5E1 !important;
        }

        .sortable-chosen {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1) !important;
        }

        /* Sidebar & Utilities */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94A3B8;
        }

        .sidebar-gradient {
            background: linear-gradient(180deg, #0F766E 0%, #06B6D4 100%);
        }

        .water-progress {
            background: linear-gradient(90deg, #0F766E, #0EA5E9, #06B6D4, #38BDF8, #0F766E);
            background-size: 200% 100%;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .custom-checkbox {
            appearance: none;
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid #CBD5E1;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            cursor: pointer;
            flex-shrink: 0;
            background-color: white;
        }

        .custom-checkbox:checked {
            background-color: #10B981;
            border-color: #10B981;
            transform: scale(1.1);
        }

        .custom-checkbox:checked::after {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: white;
            font-size: 0.75rem;
        }

        .masonry-grid {
            column-count: 1;
            column-gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .masonry-grid {
                column-count: 2;
            }
        }

        @media (min-width: 1280px) {
            .masonry-grid {
                column-count: 3;
            }
        }

        @media (min-width: 1536px) {
            .masonry-grid {
                column-count: 4;
            }
        }

        #sidebar {
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #sidebar.collapsed {
            width: 4.5rem;
        }

        #sidebar.collapsed .sidebar-text {
            opacity: 0;
            width: 0;
            display: none;
        }

        .card-header-color {
            height: 6px;
            width: 100%;
        }

        .glass-modal {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
        }
    </style>
</head>

<body class="text-slate-800 h-screen flex">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-72 sidebar-gradient flex flex-col shadow-2xl z-20 flex-shrink-0 relative">
        <button id="sidebar-toggle"
            class="absolute -right-3 top-6 bg-white text-indigo-600 rounded-full w-7 h-7 shadow-md flex items-center justify-center hover:scale-110 transition-transform z-50 border border-indigo-100">
            <i class="fa-solid fa-chevron-left text-sm"></i>
        </button>

        <div class="p-6 flex items-center gap-3 text-white sidebar-icon-only overflow-hidden">
            <div
                class="min-w-[2.5rem] h-10 rounded-xl bg-white/20 backdrop-blur flex items-center justify-center text-xl font-bold shadow-inner flex-shrink-0">
                <i class="fa-solid fa-house-person-return"></i>
            </div>
            <input type="text" id="app-title-input"
                class="bg-transparent border-b border-transparent hover:border-white/30 focus:border-white outline-none text-lg font-bold text-white w-full placeholder-white/50 transition-colors sidebar-text"
                value="Planner Home">
        </div>

        <div class="flex-grow py-4 px-4 overflow-y-auto overflow-x-hidden custom-scrollbar sidebar-padding">
            <div class="text-xs font-bold text-indigo-200 uppercase tracking-wider mb-3 px-1 sidebar-text">Shortcuts
            </div>
            <div id="shortcuts-container" class="space-y-2"></div>

            <button id="add-shortcut-btn"
                class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-cyan-100 border border-white/10 hover:bg-white/10 transition-colors mt-4 group sidebar-icon-only">
                <i class="fa-solid fa-plus text-sm group-hover:scale-110 transition-transform flex-shrink-0"></i>
                <span class="text-sm font-medium sidebar-text">Add Shortcut</span>
            </button>

            <div class="mt-8 border-t border-white/10 pt-4 sidebar-padding sidebar-text">
                <div class="text-xs font-bold text-teal-200 uppercase tracking-wider mb-2"><i
                        class="fa-solid fa-pen-nib mr-1"></i> Scratchpad</div>
                <textarea id="scratchpad-input"
                    class="w-full h-32 bg-black/10 border border-white/10 hover:border-white/30 rounded-xl p-3 text-sm text-teal-50 placeholder-teal-200/50 resize-none focus:outline-none focus:bg-black/20 focus:border-cyan-300 transition-colors custom-scrollbar"
                    placeholder="Type quick notes here..."></textarea>
            </div>
        </div>

        <div class="p-4 border-t border-white/10 bg-black/10 space-y-3 sidebar-padding">
            <div class="flex gap-2 sidebar-text">
                <button id="import-template-btn"
                    class="flex-1 flex items-center justify-center gap-2 px-3 py-2 text-indigo-100 hover:text-white hover:bg-white/10 rounded-lg transition-all border border-transparent hover:border-white/20"
                    title="Import JSON">
                    <i class="fa-solid fa-file-import text-sm"></i> <span class="text-sm">Import</span>
                </button>
                <button id="export-template-btn"
                    class="flex-1 flex items-center justify-center gap-2 px-3 py-2 text-indigo-100 hover:text-white hover:bg-white/10 rounded-lg transition-all border border-transparent hover:border-white/20"
                    title="Export JSON">
                    <i class="fa-solid fa-file-export text-sm"></i> <span class="text-sm">Export</span>
                </button>
            </div>
            <button id="reset-day-btn"
                class="w-full flex items-center gap-3 px-3 py-2 text-red-200 hover:text-white hover:bg-red-500/20 rounded-lg transition-all sidebar-icon-only"
                title="Factory Reset">
                <i class="fa-solid fa-power-off w-5 text-center text-sm flex-shrink-0"></i>
                <span class="text-sm sidebar-text">Reset Data</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col h-screen overflow-hidden bg-[#F3F4F6] relative">

        <!-- Header -->
        <header class="bg-white/80 backdrop-blur-md border-b border-gray-200 px-6 py-4 z-10 sticky top-0 shadow-sm">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-6 w-full md:w-auto">
                    <div>
                        <h2
                            class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-teal-600 to-cyan-500">
                            Daily Plan
                        </h2>
                        <span id="clock-display" class="text-sm font-bold text-gray-400 font-mono">--:--:--</span>
                    </div>
                    <div class="h-10 w-px bg-gray-200 hidden md:block"></div>
                    <div class="flex flex-col justify-center">
                        <div class="flex items-end gap-3">
                            <span id="progress-percent" class="text-3xl font-bold text-teal-600 leading-none">0%</span>
                            <span id="progress-count" class="text-sm font-medium text-gray-500 mb-1">0/0 Tasks</span>
                        </div>
                        <div class="w-48 h-2.5 bg-gray-200 rounded-full mt-1.5 overflow-hidden shadow-inner">
                            <div id="overall-progress-bar" class="h-full water-progress animate-water-flow"
                                style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <div class="flex items-center gap-4 ml-auto">
                    <button id="edit-mode-btn"
                        class="bg-white border border-indigo-100 text-indigo-600 hover:bg-indigo-50 px-4 py-2 rounded-xl shadow-sm transition-all text-sm font-bold flex items-center gap-2 h-10">
                        <i class="fa-solid fa-pen-to-square"></i> <span class="hidden sm:inline">Edit Mode</span>
                    </button>

                    <div class="flex items-center bg-gray-50 rounded-xl p-1 border border-gray-200 h-10">
                        <button id="today-btn"
                            class="px-4 py-1.5 rounded-lg bg-white text-indigo-600 shadow-sm font-bold text-sm hover:text-indigo-800 transition-colors mr-2">Today</button>
                        <input type="date" id="date-picker"
                            class="bg-transparent border-none text-sm text-gray-600 focus:ring-0 cursor-pointer font-medium">
                    </div>
                </div>
            </div>
        </header>

        <!-- Content Area -->
        <div id="scroll-container" class="flex-grow overflow-y-auto p-6 custom-scrollbar">
            <div id="task-grid" class="masonry-grid pb-24">
                <!-- Cards injected here -->
            </div>
        </div>

        <!-- Bot Log Panel (Sliding) -->
        <div id="log-panel"
            class="fixed bottom-0 right-8 w-80 bg-slate-900 text-slate-300 rounded-t-2xl shadow-2xl transform translate-y-full transition-transform duration-500 z-40 border border-slate-700 border-b-0">
            <div class="px-4 py-3 border-b border-slate-700 flex justify-between items-center cursor-pointer"
                onclick="toggleLogPanel()">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-terminal text-teal-400 text-xs shadow-sm"></i>
                    <span class="text-xs font-bold uppercase tracking-widest text-slate-200">Bot Output</span>
                    <span id="log-badge" class="hidden w-2 h-2 bg-teal-500 rounded-full animate-pulse"></span>
                </div>
                <i id="log-chevron" class="fa-solid fa-chevron-up text-xs text-slate-500"></i>
            </div>
            <div id="log-content"
                class="h-48 overflow-y-auto p-4 font-mono text-[10px] space-y-1.5 custom-scrollbar bg-slate-950/50">
                <div class="text-slate-500 italic">Ready for automation logs...</div>
            </div>
        </div>

        <!-- Toast -->
        <div id="toast"
            class="fixed bottom-8 left-1/2 transform -translate-x-1/2 translate-y-20 opacity-0 transition-all duration-500 z-50 pointer-events-none">
            <div
                class="bg-white/95 backdrop-blur-md border border-slate-100 shadow-2xl px-6 py-4 rounded-2xl flex items-center gap-4 min-w-[320px]">
                <div id="toast-icon-container"
                    class="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center">
                    <i id="toast-icon" class="fa-solid fa-info-circle text-indigo-500 text-xl"></i>
                </div>
                <div class="flex-grow">
                    <p id="toast-message" class="text-sm font-bold text-slate-800 leading-tight">Notification</p>
                    <p class="text-[10px] text-slate-400 uppercase tracking-wider mt-0.5">System Notification</p>
                </div>
            </div>
        </div>

        <!-- FAB Group (Visible in Edit Mode) -->
        <div class="fixed bottom-8 right-8 flex flex-col gap-4 z-30">
            <button id="add-workflow-fab"
                class="hidden w-16 h-16 bg-gradient-to-tr from-teal-600 to-cyan-500 text-white rounded-2xl shadow-lg shadow-teal-500/30 items-center justify-center hover:scale-110 active:scale-95 transition-all text-xl group">
                <i class="fa-solid fa-plus"></i>
                <span
                    class="absolute right-full mr-4 px-3 py-1 bg-slate-800 text-white text-[10px] rounded-lg opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none uppercase font-bold tracking-widest">Add
                    New Category</span>
            </button>
        </div>

    </main>

    <input type="file" id="import-file-input" class="hidden" accept=".json">

    <script src="renderer.js"></script>
</body>

</html>
